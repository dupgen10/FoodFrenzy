<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodFrenzy - Products</title> 
    <link rel="icon" type="image/x-icon" th:href="@{/Images/logo.png}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" th:href="@{/css/Navigation.css}" />
    <link rel="stylesheet" th:href="@{/css/Products.css}" />
</head>

<body>
    <nav th:replace="~{Navigation::navbar()}"></nav>
    <div id="main-container">
        <div id="biryani"> 
            
            <!-- Dynamically iterate over products -->
            <div class="item-card" th:each="product : ${products}">
                <div class="card-top">
                    <i class="fa fa-star" id="rating">4.5</i>
                    <i class="fa fa-heart-o add-to-cart" aria-label="Add to favorites"></i>
                </div>
                <!-- Using a placeholder image for dynamic products, can be updated later to have actual image URLs in DB -->
                <img th:src="@{/Images/biryani/Biryani_of_Hyderabadi.jpg}" alt="Product Image">
                <p class="item-name" th:text="${product.pname}">Product Name</p>
                <p class="item-price" th:text="'Price: Rs ' + ${product.pprice}">Price: Rs 0</p>
                <p style="font-size: 12px; color: #555; padding: 0 10px;" th:text="${product.pdescription}">Description</p>
                <a href="/login" id="buy" class="buy-btn">Buy Now</a>
            </div> 
             
        </div>
    </div>
    <script>
        // Use class selector since there will be multiple buy buttons now
        document.querySelectorAll(".buy-btn").forEach(function(btn) {
            btn.addEventListener("click", function (event) {
                // If the user is not logged in (href is /login), it will redirect.
                // If they need to be logged in to order, this script handles it.
                // Wait, if it's just <a href="/login"> it will redirect to login.
                // Let's just let the normal flow happen or we can alert.
            });
        });
    </script>
</body>
</html>
