<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Buy Product</title>
    <style>
        body {
            background-image: url("https://images.pexels.com/photos/7219747/pexels-photo-7219747.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1");
            background-size: cover; 
        }

        * {
            font-size: 16px;
            font-family: sans-serif;
        }

        .searchInput {
            margin-top: 30px;
        }

        .searchInput input {
            padding: 15px;
            width: 270px;
        }

        .searchInput button {
            padding: 15px;
            width: 100px;
            background-color: red;
            color: white;
            border: none;
            cursor: pointer;
        }

        .details {
            margin-top: 70px;
            background-color: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }

        .details input,
        .details button {
            display: block;
            padding: 5px;
            font-size: 16px;
            margin: 5px 0;
        }

        .details button {
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        .logout-btn {
            border: 1px solid black;
            background-color: darkred;
            color: white;
            text-decoration: none;
            padding: 7px;
            position: fixed;
            top: 10px;
            left: 10px;
            border: none;
            cursor: pointer;
        }

        .details th{
            background-color: dimgray;
            color: white;
            font-family: sans-serif;
            padding: 10px;
            border: none;
        }
        td{
            text-align: center;
            border-bottom: 1px solid lightslategrey;
            padding: 10px;
        }
        .welcome marquee, .welcome span
        {
            width: 50%;
            font-size: 20px;
            font-family: sans-serif;
            color: #fff;
            text-shadow: 1px 1px 2px black;
        }
        
    </style>
</head>

<body>
    <div class="welcome">
            <marquee direction="right" scrollamount="15">Welcome Back <span th:text="${name}"></span>
            </marquee><br />
    </div>
    
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="logout-btn">Logout</button>
    </form>
    
    <center>
        <form th:action="@{/product/search}" method="post" class="searchInput">
            <h1>Product Search :</h1>
            <input type="text" name="productName" required placeholder="Please enter the Product Name....">
            <button type="submit">SEARCH</button><br />
            <small style="color: red; font-weight: bold; background-color: rgba(255,255,255,0.8); padding: 5px;" th:if="${message}" th:text="${message}"> </small>
        </form>
        
        <div th:if="${product!=null}" class="details">
            <form th:action="@{/product/order}" th:object="${product}" method="post">
                ProductName :
                <input type="text" name="oName" th:value="${product.pname}" readonly /><br />
                Product Price :
                <input type="text" name="oPrice" th:value="${product.pprice}" readonly /><br />
                Quantity :
                <input type="number" placeholder="Minimum: 1" min="1" name="oQuantity" required /><br />

                <button type="submit">Order Now</button>
            </form>
        </div>
        
        <div th:if="${orders!=null and !orders.empty}" class="details">
            <h2>Your Orders :</h2>
            <table >
                <tr>
                    <th>Product_Name</th>
                    <th>Product_Price</th>
                    <th>Product_Quantity</th>
                    <th>Total_Amount</th>
                    <th>Date</th>
                </tr>
                <tr th:each="order :${orders}">
                    <td th:text="${order.oName}"></td>
                    <td th:text="${order.oPrice}"></td>
                    <td th:text="${order.oQuantity}"></td>
                    <td th:text="${order.totalAmount}"></td>
                    <td th:text="${#temporals.format(order.orderDate, 'dd-MMM-yyyy HH:mm')}"></td>
                </tr>
            </table>
        </div>
    </center>
</body>
</html>
